<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>SIE-SRC Owner - Tambah Produk</title>

    <!-- Custom fonts for this template-->
    <link href="../vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="../css/sb-admin-2.min.css" rel="stylesheet">
    <style>
        .bg-gradient-primary {
            background-color: #e74a3b;
            background-image: linear-gradient(180deg, #e74a3b 10%, #991f1f 100%);
        }
        .btn-primary {
            background-color: #e74a3b;
            border-color: #e74a3b;
        }
        .btn-primary:hover {
            background-color: #991f1f;
            border-color: #991f1f;
        }
    </style>
</head>

<body id="page-top">
    <!-- Page Wrapper -->
    <div id="wrapper">
        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">
            <!-- Main Content -->
            <div id="content">
                <!-- Begin Page Content -->
                <div class="container-fluid">
                    <!-- Page Heading -->
                    <h1 class="h3 mb-4 text-gray-800">Tambah Produk</h1>

                    <!-- Form Tambah Produk -->
                    <div class="card shadow mb-4">
                        <div class="card-header py-3">
                            <h6 class="m-0 font-weight-bold text-danger">Form Tambah Produk</h6>
                        </div>
                        <div class="card-body">
                            <form id="formTambahProduk">
                                <div class="form-group">
                                    <label for="namaProduk">Nama Produk</label>
                                    <input type="text" class="form-control" id="namaProduk" required>
                                </div>
                                <div class="form-group">
                                    <label for="hargaProduk">Harga</label>
                                    <input type="number" class="form-control" id="hargaProduk" required>
                                </div>
                                <div class="form-group">
                                    <label for="stokProduk">Stok</label>
                                    <input type="number" class="form-control" id="stokProduk" required>
                                </div>
                                <div class="form-group">
                                    <label for="deskripsiProduk">Deskripsi</label>
                                    <textarea class="form-control" id="deskripsiProduk" rows="3"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary">Tambah Produk</button>
                                <a href="index.html" class="btn btn-secondary">Kembali</a>
                            </form>
                        </div>
                    </div>
                </div>
                <!-- /.container-fluid -->
            </div>
            <!-- End of Main Content -->
        </div>
        <!-- End of Content Wrapper -->
    </div>
    <!-- End of Page Wrapper -->

    <!-- Bootstrap core JavaScript-->
    <script src="../vendor/jquery/jquery.min.js"></script>
    <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="../vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="../js/sb-admin-2.min.js"></script>

    <!-- Page level custom scripts -->
    <script>
        $(document).ready(function() {
            $('#formTambahProduk').on('submit', function(e) {
                e.preventDefault();
                // Add your form submission logic here
                alert('Produk berhasil ditambahkan!');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>

</html>
